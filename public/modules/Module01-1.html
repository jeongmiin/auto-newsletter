<table align="center" border="0" cellpadding="0" cellspacing="0"
  style="width:100%; max-width: 680px; border-collapse:collapse; table-layout:fixed;" width="100%">
  <tbody>
    <tr>
      <td style="padding:0 20px;" align="center">
        <div
          style="display: inline-block; margin:0px; vertical-align:top; border-collapse:collapse; padding-bottom:20px; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align: left; min-width: 49%; max-width: 100%; width: calc((570px - 100%) * 570);">
          <div
            style="background-color:{{titleBgColor}}; font-size: {{leftTitleFontSize}}; font-weight:700; color:{{titleTextColor}}; line-height:{{leftTitleLineHeight}}; letter-spacing:-0.03em; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align:center; padding:6px 0px; font-family: AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
            {{leftTitle}}
          </div>
          <div
            style="background-color:{{contentBgColor}}; color:{{contentTextColor}}; font-size: {{leftContentFontSize}}; font-weight:400; letter-spacing:-0.03em; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align:center; font-family: AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif; padding:10px;">
            {{leftContent}}
          </div>
        </div>
        <div
          style="display: inline-block; margin:0px; vertical-align:top; border-collapse:collapse; padding-bottom:20px; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align: left; min-width: 49%; max-width: 100%; width: calc((570px - 100%) * 570);">
          <div
            style="background-color:{{titleBgColor}}; font-size: {{rightTitleFontSize}}; font-weight:700; color:{{titleTextColor}}; line-height:{{rightTitleLineHeight}}; letter-spacing:-0.03em; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align:center; padding:6px 0px; font-family: AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
            {{rightTitle}}
          </div>
          <div
            style="background-color:{{contentBgColor}}; color:{{contentTextColor}}; font-size: {{rightContentFontSize}}; font-weight:400; letter-spacing:-0.03em; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; text-align:center; font-family: AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif; padding:10px;">
            {{rightContent}}
          </div>
        </div>
      </td>
    </tr>
    <!-- 추가 tr 위치 -->
  </tbody>
</table>
