<!-- 섹션 타이틀 -->
<table border="0" cellpadding="0" cellspacing="0" style="width:100%; max-width:680px; border-top:2px solid #333333;" width="100%">
  <tbody>
    <!-- 메인 타이틀 -->
    <tr>
      <td style="padding:{{mainTitlePaddingTop}} {{mainTitlePaddingRight}} {{mainTitlePaddingBottom}} {{mainTitlePaddingLeft}}; font-size:{{mainTitleFontSize}}; font-weight:700; color:#111111; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; font-family:AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        {{mainTitle}}
      </td>
    </tr>
    <!-- //메인 타이틀 -->

    <!-- 서브 타이틀 -->
    <tr>
      <td style="padding:{{subTitlePaddingTop}} {{subTitlePaddingRight}} {{subTitlePaddingBottom}} {{subTitlePaddingLeft}}; box-sizing: border-box; font-size:{{subTitleFontSize}}; font-weight:600; color:#333333; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; letter-spacing:-0.03em; line-height:1.5em; font-family:AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        {{subTitle}}
      </td>
    </tr>
    <!-- //서브 타이틀 -->
  </tbody>
</table>
<!-- //섹션 타이틀 -->
