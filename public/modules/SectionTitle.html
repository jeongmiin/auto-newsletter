<!-- 섹션 타이틀 -->
<table align="center" border="0" cellpadding="0" cellspacing="0" style="width:100%; max-width:680px; background-color:{{sectionBgColor}}; border-top:{{topBorderWidth}} solid {{topBorderColor}};" width="100%">
  <tbody>
    <!-- 이미지 타이틀 -->
    <tr>
      <td align="{{sectionImageAlign}}" style="padding:{{sectionImagePaddingTop}} {{sectionImagePaddingRight}} {{sectionImagePaddingBottom}} {{sectionImagePaddingLeft}}; box-sizing: border-box; text-align:{{sectionImageAlign}};">
        <a href="{{sectionImageLinkUrl}}" target="_blank" style="text-decoration:none;"><img src="{{sectionImageUrl}}" alt="{{sectionImageAlt}}" style="display:inline-block; width:100%; max-width:{{sectionImageMaxWidth}}; border:0;"></a>
      </td>
    </tr>
    <!-- //이미지 타이틀 -->

    <!-- 메인 타이틀 -->
    <tr>
      <td style="padding:{{mainTitlePaddingTop}} {{mainTitlePaddingRight}} {{mainTitlePaddingBottom}} {{mainTitlePaddingLeft}}; font-size:{{mainTitleFontSize}}; font-weight:700; color:{{mainTitleColor}}; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; font-family:AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        {{mainTitle}}
      </td>
    </tr>
    <!-- //메인 타이틀 -->

    <!-- 서브 타이틀 -->
    <tr>
      <td style="padding:{{subTitlePaddingTop}} {{subTitlePaddingRight}} {{subTitlePaddingBottom}} {{subTitlePaddingLeft}}; box-sizing: border-box; font-size:{{subTitleFontSize}}; font-weight:600; color:#333333; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; letter-spacing:-0.03em; line-height:1.5em; font-family:AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        {{subTitle}}
      </td>
    </tr>
    <!-- //서브 타이틀 -->
  </tbody>
</table>
<!-- //섹션 타이틀 -->
