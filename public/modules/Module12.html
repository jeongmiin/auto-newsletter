<table align="center" border="0" cellpadding="0" cellspacing="0"
  style="max-width:680px; width:100%; border-collapse:collapse; table-layout:fixed;" width="100%">
  <tbody>
    <tr>
      <td style="padding:{{paddingTop}} {{paddingRight}} {{paddingBottom}} {{paddingLeft}}; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; letter-spacing:-0.03em; font-family: AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        <div style="background-color:{{boxBgColor}}; border:{{boxBorderWidth}} solid {{boxBorderColor}}; padding:15px 20px; box-sizing: border-box; text-align:{{textAlign}};">
          <p style="margin:0 0 8px; color:{{titleColor}}; font-size:{{titleFontSize}}; font-weight:700; line-height:{{titleLineHeight}};">{{titleText}}</p>
          <div style="color:{{textColor}}; font-size:{{textFontSize}}; line-height:{{textLineHeight}};">{{contentText}}</div>
        </div>
      </td>
    </tr>
  </tbody>
</table>
