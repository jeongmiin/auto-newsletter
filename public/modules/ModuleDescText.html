<!-- 설명 텍스트 모듈 -->
<table align="center" border="0" cellpadding="0" cellspacing="0"
  style="max-width:680px; width:100%; border-collapse:collapse; table-layout:fixed;" width="100%">
  <tbody>
    <tr>
      <td
        style="padding:{{paddingTop}} {{paddingRight}} {{paddingBottom}} {{paddingLeft}}; box-sizing: border-box; font-size:{{fontSize}}; font-weight:400; color:#333333; word-break:keep-all; word-wrap:break-word; overflow-wrap:break-word; letter-spacing:-0.03em; line-height:1.5; font-family:AppleSDGothic, malgun gothic, nanum gothic, Noto Sans KR, sans-serif;">
        {{descriptionText}}
      </td>
    </tr>
  </tbody>
</table>
